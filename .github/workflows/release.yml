name: Release

# Build the portable, self-contained app and attach it to a GitHub Release so
# users can download a ready-to-run build instead of cloning + building locally.
#   - push a tag like `v0.1.0`  -> builds + creates the Release with the zips
#   - run manually (workflow_dispatch) -> builds + uploads zips as run artifacts
#     (no Release), handy for validating the build.
#
# Each arch is assembled by eng/pack.ps1 into the "open the folder, one obvious
# thing to run" layout (root = PatreonArchiver.exe + README.txt + app\) and
# packaged as PatreonArchiver-<version>-<rid>.zip with a SHA256SUMS.txt entry.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: publish (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Fetch bundled download engine (yt-dlp / ffmpeg / ffprobe)
        run: pwsh ./src/PatreonArchiver.App/tools/fetch-tools.ps1

      - name: Restore workloads
        run: dotnet workload restore src/PatreonArchiver.App/PatreonArchiver.App.csproj

      # Publish the app into app/, build the NativeAOT launcher at the root, prune
      # locales, write README, self-verify, then zip + checksum. On a tag push the
      # version is the tag; a manual run gets a v0.0.0-dev placeholder.
      - name: Assemble bundle (publish + launcher + package)
        run: pwsh ./eng/pack.ps1 -Rid ${{ matrix.rid }} -Version ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'v0.0.0-dev' }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: PatreonArchiver-${{ matrix.rid }}
          path: |
            dist/PatreonArchiver-*-${{ matrix.rid }}.zip
            dist/SHA256SUMS.txt
          if-no-files-found: error

  release:
    name: release
    needs: publish
    # Only cut a Release for tag pushes; tolerate a single-arch publish failure
    # so the Release still goes out with whatever arches built.
    if: ${{ !cancelled() && startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # No merge-multiple: each arch lands in its own dist/<artifact-name>/ dir so
      # the per-arch SHA256SUMS.txt files (same name) don't collide.
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Combine checksums
        run: cat dist/*/SHA256SUMS.txt | sort > dist/SHA256SUMS.txt

      - name: Create / update the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" dist/*/*.zip dist/SHA256SUMS.txt \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG" \
            --generate-notes
