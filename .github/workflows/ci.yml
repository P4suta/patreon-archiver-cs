name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Required check. The Core library and its tests target plain net10.0, so they
  # restore/build/test on Linux without the Windows App SDK. The App project
  # (net10.0-windows / WinUI 3) is intentionally NOT part of this job.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/PatreonArchiver.Core.Tests/PatreonArchiver.Core.Tests.csproj

      - name: Test
        run: dotnet test tests/PatreonArchiver.Core.Tests/PatreonArchiver.Core.Tests.csproj -c Release --no-restore

  # Best-effort (non-blocking): the WinUI 3 app only builds on Windows and needs
  # the Windows App SDK workload plus the bundled download engine. Network fetch
  # from gyan.dev can be flaky, so this job must never block a merge.
  build-app:
    name: build-app (windows, best-effort)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Fetch bundled tools (yt-dlp / ffmpeg / ffprobe)
        run: pwsh ./src/PatreonArchiver.App/tools/fetch-tools.ps1

      - name: Restore workloads
        run: dotnet workload restore src/PatreonArchiver.App/PatreonArchiver.App.csproj

      - name: Build app
        run: dotnet build src/PatreonArchiver.App/PatreonArchiver.App.csproj -c Release
