name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Required check. Runs the Core unit tests (net10.0, no Windows App SDK). It
  # runs on Windows because a few tests assert Windows path semantics (drive
  # roots, '\' separators); the suite is tiny (~0.5s) so the runner cost is
  # negligible. The App project (net10.0-windows / WinUI 3) is NOT part of this.
  test:
    name: test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore tests/PatreonArchiver.Core.Tests/PatreonArchiver.Core.Tests.csproj

      - name: Test
        run: dotnet test tests/PatreonArchiver.Core.Tests/PatreonArchiver.Core.Tests.csproj -c Release --no-restore

  # Best-effort (non-blocking): assemble the full distributable bundle via
  # eng/pack.ps1 and upload it as a run artifact, so every push / PR yields a
  # ready-to-run download straight from the Actions run page (no tag or manual
  # dispatch needed). This also upgrades the smoke from "does it build" to "does
  # it assemble into a runnable bundle" (pack self-verifies). The WinUI 3 app
  # only builds on Windows and needs the Windows App SDK workload plus the
  # bundled engine; the gyan.dev fetch can be flaky, so this never blocks a merge.
  build-app:
    name: build-app (windows, best-effort)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Fetch bundled tools (yt-dlp / ffmpeg / ffprobe)
        run: pwsh ./src/PatreonArchiver.App/tools/fetch-tools.ps1

      - name: Restore workloads
        run: dotnet workload restore src/PatreonArchiver.App/PatreonArchiver.App.csproj

      - name: Assemble bundle (publish + launcher + package)
        run: pwsh ./eng/pack.ps1 -Rid win-x64 -Version v0.0.0-ci.${{ github.run_number }}

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: PatreonArchiver-win-x64
          path: |
            dist/PatreonArchiver-*-win-x64.zip
            dist/SHA256SUMS.txt
          if-no-files-found: warn
